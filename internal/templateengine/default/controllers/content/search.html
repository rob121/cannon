<article class="mb-4">
  {{template "pageHeader" (dict "Title" "Search" "Subtitle" "Find content across your site.")}}

  <form method="get" action="/content/search" class="card shadow-sm mb-4">
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-md-6 col-lg-3">
          <label class="form-label" for="search-q">Keywords</label>
          <input type="search" class="form-control" id="search-q" name="q" value="{{.Query}}" placeholder="Search items…">
        </div>
        <div class="col-md-6 col-lg-2">
          <label class="form-label" for="search-category">Category</label>
          <select class="form-select" id="search-category" name="category">
            <option value="">All categories</option>
            {{range .Categories}}
            <option value="{{.CategoryID}}" {{if eq $.CategoryID .CategoryID}}selected{{end}}>{{.Name}}</option>
            {{end}}
          </select>
        </div>
        <div class="col-md-6 col-lg-2">
          <label class="form-label" for="search-tag">Tag</label>
          <select class="form-select" id="search-tag" name="tag">
            <option value="">All tags</option>
            {{range .Tags}}
            <option value="{{.TagID}}" {{if eq $.TagID .TagID}}selected{{end}}>{{.Name}}</option>
            {{end}}
          </select>
        </div>
        <div class="col-md-6 col-lg-2">
          <label class="form-label" for="search-author">Author</label>
          <select class="form-select" id="search-author" name="author">
            <option value="">All authors</option>
            {{range .Authors}}
            <option value="{{.UserID}}" {{if eq $.AuthorID .UserID}}selected{{end}}>{{.Username}}</option>
            {{end}}
          </select>
        </div>
        <div class="col-md-6 col-lg-2">
          <label class="form-label" for="search-sort">Sort</label>
          <select class="form-select" id="search-sort" name="sort">
            <option value="" {{if eq .Sort ""}}selected{{end}}>Newest</option>
            <option value="title" {{if eq .Sort "title"}}selected{{end}}>Title A–Z</option>
            <option value="sort" {{if eq .Sort "sort"}}selected{{end}}>Manual sort</option>
            <option value="featured" {{if eq .Sort "featured"}}selected{{end}}>Featured first</option>
            <option value="popular" {{if eq .Sort "popular"}}selected{{end}}>Most commented</option>
          </select>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary">Search</button>
        </div>
      </div>
    </div>
  </form>

  <section>
    <h2 class="h4 mb-3">{{if .Query}}Results for “{{.Query}}”{{else}}Results{{end}}</h2>
    <div class="row g-3">
      {{range .Items}}{{template "itemCard" .}}{{else}}
      <div class="col-12"><p class="text-muted mb-0">No items matched your search.</p></div>
      {{end}}
    </div>
  </section>
</article>
