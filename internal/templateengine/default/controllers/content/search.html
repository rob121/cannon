<article class="site-page">
  <header class="site-hero">
    <h1 class="site-title">Search</h1>
    <p class="site-subtitle">Find content across your site.</p>
  </header>

  <form method="get" action="/content/search" class="site-search-form">
    <input type="search" name="q" value="{{.Query}}" placeholder="Search items…" class="site-form-control">
    <select name="category" class="site-form-control">
      <option value="">All categories</option>
      {{range .Categories}}
      <option value="{{.CategoryID}}" {{if eq $.CategoryID .CategoryID}}selected{{end}}>{{.Name}}</option>
      {{end}}
    </select>
    <select name="tag" class="site-form-control">
      <option value="">All tags</option>
      {{range .Tags}}
      <option value="{{.TagID}}" {{if eq $.TagID .TagID}}selected{{end}}>{{.Name}}</option>
      {{end}}
    </select>
    <select name="sort" class="site-form-control">
      <option value="" {{if eq .Sort ""}}selected{{end}}>Newest</option>
      <option value="title" {{if eq .Sort "title"}}selected{{end}}>Title A–Z</option>
      <option value="sort" {{if eq .Sort "sort"}}selected{{end}}>Manual sort</option>
    </select>
    <button type="submit" class="site-btn">Search</button>
  </form>

  <section class="site-section">
    <h2 class="site-section-title">{{if .Query}}Results for “{{.Query}}”{{else}}Results{{end}}</h2>
    <div class="site-item-grid">
      {{range .Items}}
      <article class="site-item-card">
        <h3><a href="{{itemURL .Slug}}">{{.Title}}</a></h3>
        {{if .Intro}}<p>{{.Intro}}</p>{{end}}
      </article>
      {{else}}
      <p>No items matched your search.</p>
      {{end}}
    </div>
  </section>
</article>
