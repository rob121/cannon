<article class="site-page">
  <header class="site-hero">
    <h1 class="site-title">Tag: {{.Tag.Name}}</h1>
  </header>
  <section class="site-section">
    <div class="site-item-grid">
      {{range .Items}}
      <article class="site-item-card">
        <h2><a href="/content/item/{{.Slug}}">{{.Title}}</a></h2>
        {{if .Intro}}<p>{{.Intro}}</p>{{end}}
      </article>
      {{else}}
      <p>No items with this tag.</p>
      {{end}}
    </div>
  </section>
</article>
