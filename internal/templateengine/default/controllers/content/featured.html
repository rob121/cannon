<div class="site-page mb-4">
  {{template "pageHeader" (dict "Title" (lang "content.featured_title") "Subtitle" (lang "content.featured_subtitle"))}}
  <section aria-labelledby="featured-items-heading">
    <h2 id="featured-items-heading" class="visually-hidden">{{lang "content.featured_items"}}</h2>
    <div class="site-item-list">
      {{range .Items}}{{template "itemCard" (dict "Item" .)}}{{else}}
      <p class="text-muted mb-0">{{lang "content.no_featured"}}</p>
      {{end}}
    </div>
  </section>
</div>
