<article class="mb-4">
  {{template "pageHeader" (dict "Title" "Sign In" "Subtitle" "")}}
  {{if eq .Verified "0"}}
  <div class="alert alert-info mb-3" role="alert">Your account must be verified before you can sign in. Contact a site administrator for a verification link.</div>
  {{end}}
  <div class="card shadow-sm site-login-block">
    <div class="card-body">
      {{template "loginForm" .Login}}
    </div>
  </div>
</article>
