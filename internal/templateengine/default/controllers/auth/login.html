<article class="mb-4">
  {{template "pageHeader" (dict "Title" (lang "auth.sign_in_title") "Subtitle" "")}}
  {{if eq .Verified "0"}}
  <div class="alert alert-info mb-3" role="alert">{{lang "auth.verify_required"}}</div>
  {{end}}
  <div class="card shadow-sm site-login-block">
    <div class="card-body">
      {{template "loginForm" .Login}}
    </div>
  </div>
</article>
