<article class="site-page">
  <header class="site-hero">
    <h1 class="site-title">Reset Password</h1>
  </header>
  <div class="site-content">
    {{if .Error}}<p class="site-alert site-alert-error">{{.Error}}</p>{{end}}
    {{if .Sent}}
    <p>{{.Message}}</p>
    <p><a class="site-btn site-btn-primary" href="/login">Back to Sign In</a></p>
    {{else if .Token}}
    <form class="site-form" method="post" action="/account/reset-password/{{.Token}}">
      {{csrfField}}
      <div class="site-form-field">
        <label for="password">New Password</label>
        <input id="password" name="password" type="password" required minlength="8" autocomplete="new-password">
      </div>
      <div class="site-form-field">
        <label for="password_confirm">Confirm Password</label>
        <input id="password_confirm" name="password_confirm" type="password" required minlength="8" autocomplete="new-password">
      </div>
      <div class="site-form-actions">
        <button type="submit" class="site-btn site-btn-primary">Update Password</button>
      </div>
    </form>
    {{else}}
    <form class="site-form" method="post" action="/account/reset-password">
      {{csrfField}}
      <div class="site-form-field">
        <label for="email">Email or Username</label>
        <input id="email" name="email" required autocomplete="username">
      </div>
      <div class="site-form-actions">
        <button type="submit" class="site-btn site-btn-primary">Request Reset Link</button>
        <a class="site-btn site-btn-ghost" href="/login">Back to Sign In</a>
      </div>
    </form>
    {{end}}
  </div>
</article>
