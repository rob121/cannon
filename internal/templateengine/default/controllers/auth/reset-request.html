<article class="mb-4">
  {{template "pageHeader" (dict "Title" "Reset Password")}}
  <div class="card shadow-sm site-login-block">
    <div class="card-body">
      {{if .Error}}<div class="alert alert-danger" role="alert">{{.Error}}</div>{{end}}
      {{if .Sent}}
      <div class="alert alert-info" role="alert">{{.Message}}</div>
      <a class="btn btn-primary" href="{{controllerURL "auth" "login"}}">Back to Sign In</a>
      {{else if .Token}}
      <form method="post" action="{{controllerURLFor "auth" "reset-submit" .Token}}">
        {{csrfField}}
        <div class="mb-3">
          <label class="form-label" for="password">New Password</label>
          <input class="form-control" id="password" name="password" type="password" required minlength="8" autocomplete="new-password">
        </div>
        <div class="mb-3">
          <label class="form-label" for="password_confirm">Confirm Password</label>
          <input class="form-control" id="password_confirm" name="password_confirm" type="password" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary">Update Password</button>
      </form>
      {{else}}
      <form method="post" action="{{controllerURL "auth" "reset-request"}}">
        {{csrfField}}
        <div class="mb-3">
          <label class="form-label" for="email">Email or Username</label>
          <input class="form-control" id="email" name="email" required autocomplete="username">
        </div>
        <div class="d-flex flex-wrap gap-2 align-items-center">
          <button type="submit" class="btn btn-primary">Request Reset Link</button>
          <a class="btn btn-outline-secondary" href="{{controllerURL "auth" "login"}}">Back to Sign In</a>
        </div>
      </form>
      {{end}}
    </div>
  </div>
</article>
