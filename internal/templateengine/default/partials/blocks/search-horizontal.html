<form class="site-search-block site-search-horizontal{{if .Class}} {{.Class}}{{end}}" method="get" action="{{.Action}}" role="search">
  {{if .Label}}<label class="form-label visually-hidden" for="search-block-q-{{.BlockID}}">{{.Label}}</label>{{end}}
  <div class="input-group">
    <input type="search" class="form-control" id="search-block-q-{{.BlockID}}" name="q" placeholder="{{.Placeholder}}"{{if not .Label}} aria-label="{{.Placeholder}}"{{end}} autocomplete="off">
    <button type="submit" class="btn btn-primary">{{.Button}}</button>
  </div>
</form>
