{{define "mediaFieldInput"}}
{{$id := .ID}}
{{$name := .Name}}
{{$value := .Value}}
{{$label := .Label}}{{if not $label}}{{$label = "Image"}}{{end}}
<div class="site-media-field" data-media-field>
  {{if $label}}<div class="site-media-field__title fw-semibold">{{$label}}</div>{{end}}
  <div class="site-media-field__body">
    <div class="site-media-field__preview{{if not $value}} is-empty{{end}}" data-media-field-preview>
      {{if $value}}
      <img src="{{$value}}" alt="{{$label}}" class="site-media-field__image">
      {{else}}
      <span class="site-media-field__placeholder">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10.5" r="1.5"/><path d="m21 16-5.5-5.5L5 21"/></svg>
        <span>No image</span>
      </span>
      {{end}}
    </div>
    <div class="site-media-field__controls">
      <label class="form-label" for="{{$id}}">{{if .FieldLabel}}{{.FieldLabel}}{{else}}Image URL{{end}}</label>
      <div class="input-group site-media-field__url-row">
        <input class="form-control" type="url" id="{{$id}}" name="{{$name}}" value="{{$value}}" placeholder="/assets/media/..." inputmode="url" autocomplete="off" data-media-field-url>
        <button type="button" class="btn btn-outline-secondary" data-media-field-clear{{if not $value}} hidden{{end}} aria-label="{{lang "profile.clear_image"}}">{{lang "profile.clear_image"}}</button>
      </div>
      {{if .FileName}}
      <label class="form-label site-media-field__file-label" for="{{$id}}-file">{{lang "profile.upload_image"}}</label>
      <input class="form-control form-control-sm" type="file" id="{{$id}}-file" name="{{.FileName}}" accept="image/jpeg,image/png,image/gif,image/webp,image/svg+xml" data-media-field-file>
      {{end}}
      {{if .Help}}<p class="form-text mb-0">{{.Help}}</p>{{end}}
    </div>
  </div>
</div>
{{end}}
