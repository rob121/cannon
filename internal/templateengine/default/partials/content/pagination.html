{{define "contentPagination"}}
{{if and .Pagination (gt .TotalPages 1)}}
<nav class="mt-4" aria-label="Content pagination">
  <ul class="pagination justify-content-center mb-0">
    <li class="page-item{{if le .Page 1}} disabled{{end}}">
      <a class="page-link" href="{{if gt .Page 1}}{{.PaginationBaseURL}}?page={{sub .Page 1}}{{else}}#{{end}}" aria-label="Previous page">Previous</a>
    </li>
    <li class="page-item disabled" aria-current="page">
      <span class="page-link">Page {{.Page}} of {{.TotalPages}}</span>
    </li>
    <li class="page-item{{if ge .Page .TotalPages}} disabled{{end}}">
      <a class="page-link" href="{{if lt .Page .TotalPages}}{{.PaginationBaseURL}}?page={{add .Page 1}}{{else}}#{{end}}" aria-label="Next page">Next</a>
    </li>
  </ul>
</nav>
{{end}}
{{end}}
