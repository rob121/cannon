{{template "page_header" .}}
<div class="admin-data-card">
  <div class="admin-table-scroll">
    <table class="admin-table">
      <thead>
        <tr>
          {{template "sort_th" (dict "Root" $ "Key" "name" "Label" "Name")}}
          <th>Fields</th>
          <th class="admin-col-actions"></th>
        </tr>
      </thead>
      <tbody>
        {{range .Rows}}
        <tr>
          <td><span class="admin-cell-primary">{{.Name}}</span></td>
          <td>{{len .Fields}}</td>
          {{template "row_actions" (dict "BasePath" $.BasePath "ID" .FieldGroupID)}}
        </tr>
        {{else}}
        <tr><td colspan="3"><div class="admin-empty">No Field Groups Found</div></td></tr>
        {{end}}
      </tbody>
    </table>
  </div>
  {{template "pagination" .}}
</div>
