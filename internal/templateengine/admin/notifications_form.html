{{template "page_header" .}}
<div class="admin-form-card">
  <div class="admin-form-card-body">
    {{template "error_alert" .}}
    <form method="post">
      {{csrfField}}
      <div class="row g-3">
        <div class="col-md-6">
          <label class="admin-form-label">Name</label>
          <input class="admin-form-control" name="name" value="{{.Row.Name}}" required>
        </div>
        <div class="col-md-6">
          <label class="admin-form-label">Status</label>
          <select class="admin-form-control" name="status">
            <option value="active" {{if eq .Row.Status "active"}}selected{{end}}>Active</option>
            <option value="inactive" {{if eq .Row.Status "inactive"}}selected{{end}}>Inactive</option>
          </select>
        </div>
        <div class="col-12">
          <label class="admin-form-label">Shoutrrr URL</label>
          <input class="admin-form-control" name="shoutrr_url" value="{{.Row.ShoutrrURL}}" placeholder="smtp://user:pass@host:587/?from=...&to=..." required>
          <p class="admin-form-help">Service URL in <a href="https://github.com/containrrr/shoutrrr" target="_blank" rel="noopener">shoutrrr</a> format (smtp, slack, etc.).</p>
        </div>
        <div class="col-12">
          <label class="admin-form-label">Hook Events</label>
          <div class="admin-check-grid">
            {{range .HookEvents}}
            <label class="admin-check-label">
              <input type="checkbox" name="events" value="{{.}}" {{if inString $.SelectedEvents .}}checked{{end}}> {{.}}
            </label>
            {{end}}
          </div>
        </div>
      </div>
      {{template "form_actions" .}}
    </form>
  </div>
</div>
