{{template "page_header" .}}
<div class="admin-form-card">
  <div class="admin-form-card-body">
    {{template "error_alert" .}}
    <form method="post">
      {{csrfField}}
      <div class="row g-3">
        <div class="col-md-6">
          <label class="admin-form-label">Name</label>
          <input class="admin-form-control" name="name" value="{{.Row.Name}}" required>
        </div>
        <div class="col-md-6">
          <label class="admin-form-label">Slug</label>
          <input class="admin-form-control" name="slug" value="{{.Row.Slug}}" placeholder="auto-generated">
        </div>
        <div class="col-md-6">
          <label class="admin-form-label">Parent Category</label>
          <select class="admin-form-control" name="parent_id">
            <option value="">None</option>
            {{range .AllCategories}}
            {{if ne .CategoryID $.Row.CategoryID}}
            <option value="{{.CategoryID}}" {{if uintPtrEq $.Row.ParentID .CategoryID}}selected{{end}}>{{.Name}}</option>
            {{end}}
            {{end}}
          </select>
        </div>
        <div class="col-md-6">
          <label class="admin-form-label">Field Group</label>
          <select class="admin-form-control" name="field_group_id">
            <option value="">None</option>
            {{range .FieldGroups}}
            <option value="{{.FieldGroupID}}" {{if uintPtrEq $.Row.FieldGroupID .FieldGroupID}}selected{{end}}>{{.Name}}</option>
            {{end}}
          </select>
        </div>
        <div class="col-12">
          <label class="admin-form-label">Description</label>
          <textarea class="admin-form-control" name="description" rows="4">{{.Row.Description}}</textarea>
        </div>
        <div class="col-md-6">
          <label class="admin-form-label">Image URL</label>
          <input class="admin-form-control" name="image" value="{{.Row.Image}}">
        </div>
        <div class="col-md-6">
          <label class="admin-form-label">Template Override</label>
          <input class="admin-form-control" name="template" value="{{.Row.Template}}" placeholder="default/controllers/content/category.html">
        </div>
        <div class="col-md-4">
          <label class="admin-form-label">Sort</label>
          <input class="admin-form-control" type="number" name="sort" value="{{.Row.Sort}}">
        </div>
        <div class="col-md-4">
          <label class="admin-form-label">Status</label>
          <select class="admin-form-control" name="status">
            <option value="active" {{if eq .Row.Status "active"}}selected{{end}}>Active</option>
            <option value="inactive" {{if eq .Row.Status "inactive"}}selected{{end}}>Inactive</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="admin-form-check mt-4">
            <input type="checkbox" name="inherit_settings" {{if .Row.InheritSettings}}checked{{end}}> Inherit Settings From Parent
          </label>
        </div>
        {{template "group_visibility_fields" .}}
      </div>
      {{template "form_actions" .}}
    </form>
  </div>
</div>
