{{define "groups_form_permissions"}}
        {{if .CanManagePerms}}
        <div class="col-12"><div class="admin-form-divider"></div></div>
        <div class="col-12">
          <label class="admin-form-label">Admin Area Access</label>
          <p class="admin-form-help mb-3">Grant this group read or write access to admin sections. Administrators always have full access.</p>
          <div class="admin-table-scroll">
            <table class="admin-table">
              <thead>
                <tr><th>Section</th><th>Read</th><th>Write</th></tr>
              </thead>
              <tbody>
                {{range .AdminRoutes}}
                {{$route := index $.GroupAdminRoutes .Path}}
                <tr>
                  <td>{{.Label}} <code class="admin-code">/admin{{.Path}}</code></td>
                  <td><input type="checkbox" name="route_read_{{.FormKey}}" {{if $route.CanRead}}checked{{end}}></td>
                  <td><input type="checkbox" name="route_write_{{.FormKey}}" {{if $route.CanWrite}}checked{{end}}></td>
                </tr>
                {{end}}
              </tbody>
            </table>
          </div>
        </div>
        {{end}}
{{end}}
